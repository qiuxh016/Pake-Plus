[[permission]]
identifier = "allow-settings-commands"
description = "Allows the main webview to call all app commands."
commands.allow = [
  "get_settings",
  "save_settings",
  "reset_settings",
  "validate_settings",
  "get_module_stats",
  "get_diagnostics",
  "copy_diagnostics_report",
  "export_data",
  "get_download_dir",
  "import_data",
  "preview_import",
  "list_backups",
  "rollback_settings",
  "pick_save_path",
  "pick_zip_file",
  "clipboard_list",
  "clipboard_search",
  "clipboard_copy_item",
  "clipboard_delete_item",
  "clipboard_clear_all",
  "clipboard_stats",
  "clipboard_show_panel",
  "clipboard_hide_panel",
  "clipboard_get_settings",
  "clipboard_update_settings",
  "adblock_get_stats",
  "adblock_add_rule",
  "adblock_remove_rule",
  "adblock_report_blocked",
  "cache_fetch",
  "cache_get_stats",
  "cache_clear",
  "cache_stats_json",
]
